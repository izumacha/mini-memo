<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ミニメモ（複数）</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0: #070A12;
      --bg1: #0B1020;
      --panel: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.48);

      --accent: #7C5CFF;
      --accent2:#2DE2E6;

      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --radius2: 22px;
    }

    *{ box-sizing:border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,.22), transparent 50%),
        radial-gradient(900px 520px at 90% 30%, rgba(45,226,230,.16), transparent 55%),
        radial-gradient(800px 520px at 40% 90%, rgba(124,92,255,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      padding: 18px;
    }

    .topbar{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      margin: 2px 0 14px;
    }

    /* --- Logo-ish title --- */
    .logo{
      display:inline-flex;
      align-items: baseline;
      gap: 10px;
    }
    .logoMark{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:
        0 0 0 4px rgba(124,92,255,.16),
        0 10px 18px rgba(0,0,0,.35);
      transform: translateY(-2px);
      flex: 0 0 auto;
    }
    h1{
      font-size: 28px;
      font-weight: 950;
      letter-spacing: .3px;
      margin: 0;
      line-height: 1.05;
      background: linear-gradient(135deg, rgba(124,92,255,1), rgba(45,226,230,1));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 10px 22px rgba(124,92,255,.16))
              drop-shadow(0 10px 22px rgba(45,226,230,.10));
    }
    .subtitle{ display:none; } /* 非表示 */

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .dot{
      width:8px; height:8px; border-radius:999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 3px rgba(124,92,255,.18);
    }

    .app{
      display:grid;
      grid-template-columns: 380px 1fr;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 860px){
      .app{ grid-template-columns: 1fr; }
      body{ padding: 14px; }
      h1{ font-size: 26px; }
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap: wrap;
    }

    /* Buttons */
    button{
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 11px;
      font-size: 13px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .06s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      user-select: none;
    }
    button:hover{
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.18);
    }
    button:active{ transform: translateY(1px); }
    button:focus-visible{
      outline: none;
      box-shadow:
        0 0 0 3px rgba(124,92,255,.25),
        0 0 0 1px rgba(255,255,255,.12) inset;
      border-color: rgba(124,92,255,.45);
    }

    #new{
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(45,226,230,.80));
      border-color: rgba(255,255,255,.14);
      color: #070A12;
      font-weight: 800;
    }
    #new:hover{ filter: brightness(1.03); }

    /* Pin button states */
    #pin{
      border-color: rgba(255,255,255,.14);
    }
    #pin.pinned{
      background: linear-gradient(180deg, rgba(124,92,255,.16), rgba(255,255,255,.06));
      border-color: rgba(124,92,255,.45);
      box-shadow: 0 0 0 3px rgba(124,92,255,.14);
    }

    /* Danger */
    #del{
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.12);
    }
    #del:hover{
      border-color: rgba(255,90,90,.35);
      box-shadow: 0 0 0 3px rgba(255,90,90,.12);
    }

    input[type="search"]{
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      font-size: 14px;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
      outline: none;
    }
    input[type="search"]::placeholder{ color: rgba(255,255,255,.38); }
    input[type="search"]:focus{
      border-color: rgba(124,92,255,.55);
      box-shadow: 0 0 0 3px rgba(124,92,255,.18);
      background: rgba(0,0,0,.22);
    }

    .muted{
      color: var(--muted2);
      font-size: 12px;
    }
    .count{
      margin-left:auto;
      font-size: 12px;
      color: var(--muted);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .list{
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap: 8px;
      max-height: 62vh;
      overflow:auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }
    .list::-webkit-scrollbar{ width: 10px; }
    .list::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,.10);
    }

    .item{
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      padding: 10px 10px;
      cursor: pointer;
      background: rgba(255,255,255,.04);
      transition: transform .06s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
      position: relative;
    }
    .item:hover{
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.16);
    }
    .item:active{ transform: translateY(1px); }

    .item.active{
      border-color: rgba(124,92,255,.55);
      box-shadow:
        0 0 0 3px rgba(124,92,255,.18),
        0 10px 25px rgba(0,0,0,.28);
      background:
        linear-gradient(180deg, rgba(124,92,255,.14), rgba(255,255,255,.04));
    }
    .item.active::before{
      content:"";
      position:absolute;
      left: 10px; top: 10px; bottom: 10px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      opacity: .9;
    }
    .item.active .title, .item.active .meta{ padding-left: 10px; }

    .titleRow{
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .pinBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 18px;
      height: 18px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.20);
      color: rgba(255,255,255,.80);
      font-size: 12px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .title{
      font-size: 13px;
      font-weight: 750;
      margin-bottom: 3px;
      letter-spacing: .15px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta{
      font-size: 11px;
      color: var(--muted2);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    textarea{
      width:100%;
      min-height: 70vh;
      padding: 14px 14px;
      font-size: 16px;
      line-height: 1.6;
      border-radius: var(--radius2);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
      resize: vertical;
    }
    textarea::placeholder{ color: rgba(255,255,255,.38); }
    textarea:focus{
      border-color: rgba(45,226,230,.55);
      box-shadow: 0 0 0 3px rgba(45,226,230,.14);
      background: rgba(0,0,0,.22);
    }

    .status{
      margin-left:auto;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      min-height: 26px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
    }
    .status:empty{
      border-color: transparent;
      background: transparent;
      padding: 0;
      min-height: 0;
    }
    .ok  { color:#6EE7A8; border-color: rgba(110,231,168,.25); background: rgba(110,231,168,.08); }
    .warn{ color:#FBBF24; border-color: rgba(251,191,36,.25);  background: rgba(251,191,36,.08); }
    .err { color:#F87171; border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.08); }

    .panelHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panelTitle{
      font-size: 12px;
      color: rgba(255,255,255,.78);
      font-weight: 700;
      letter-spacing: .2px;
    }

    /* Toast for Undo */
    .toast{
      position: fixed;
      right: 14px;
      bottom: 14px;
      max-width: min(520px, calc(100vw - 28px));
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,14,28,.72);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
      transform: translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 9999;
    }
    .toast.show{
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .toastMsg{
      color: rgba(255,255,255,.86);
      font-size: 13px;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast button{
      padding: 9px 10px;
      border-radius: 12px;
      font-weight: 800;
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(45,226,230,.80));
      color: #070A12;
      border-color: rgba(255,255,255,.14);
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="logo">
      <span class="logoMark" aria-hidden="true"></span>
      <h1>ミニメモ</h1>
      <div class="subtitle">複数 / 自動保存 / JSON & Markdown / 文字化け対策</div>
    </div>

    <div class="badge" title="保存先">
      <span class="dot"></span>
      <span>localStorage（このブラウザ）</span>
    </div>
  </div>

  <div class="app">
    <div class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Memos</div>
        <div id="count" class="count"></div>
      </div>

      <div class="row" style="margin-bottom:10px;">
        <button id="new">＋ 新規</button>
        <button id="pin" title="ピン留め（固定）">📌 ピン</button>
        <button id="del">削除</button>

        <button id="exportJson">JSON</button>
        <button id="exportMd">MD</button>
        <button id="import">インポート</button>
        <input id="importFile" type="file" accept="application/json" hidden />
        <span id="status" class="status"></span>
      </div>

      <input id="search" type="search" placeholder="検索（タイトル/本文）" />

      <div class="row" style="margin-top:8px;">
        <div class="muted">Tips: 先頭1行がタイトルになります</div>
        <div class="muted" style="margin-left:auto;">Undo: Ctrl/⌘ + Z</div>
      </div>

      <div id="list" class="list"></div>
    </div>

    <div class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Editor</div>
        <div class="muted" style="margin-left:auto;">自動保存: 300ms</div>
      </div>
      <textarea id="editor" placeholder="メモ本文…（先頭1行がタイトルになります）"></textarea>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <div id="toastMsg" class="toastMsg"></div>
    <button id="toastUndo" type="button">元に戻す</button>
  </div>

  <script>
    const KEY = "mini_memos_v2";

    /** @type {{id:string, text:string, updatedAt:number, pinned?:boolean}[]} */
    let memos = [];
    let currentId = null;
    let timer = null;

    // Undo state
    /** @type {null | { type: "delete" | "pin", at: number, payload: any }} */
    let lastAction = null;
    let toastTimer = null;

    const $list = document.getElementById("list");
    const $editor = document.getElementById("editor");
    const $status = document.getElementById("status");
    const $count = document.getElementById("count");
    const $search = document.getElementById("search");

    const $new = document.getElementById("new");
    const $pin = document.getElementById("pin");
    const $del = document.getElementById("del");
    const $exportJson = document.getElementById("exportJson");
    const $exportMd = document.getElementById("exportMd");
    const $import = document.getElementById("import");
    const $importFile = document.getElementById("importFile");

    const $toast = document.getElementById("toast");
    const $toastMsg = document.getElementById("toastMsg");
    const $toastUndo = document.getElementById("toastUndo");

    const uid = () => (crypto?.randomUUID?.() ?? String(Date.now()) + Math.random().toString(16).slice(2));
    const now = () => Date.now();

    const setStatus = (text, kind = "ok", ms = 900) => {
      $status.textContent = text;
      $status.className = `status ${kind}`;
      if (ms > 0) setTimeout(() => { $status.textContent = ""; $status.className = "status"; }, ms);
    };

    const showToast = (msg, action) => {
      // action: function or null
      if (toastTimer) clearTimeout(toastTimer);
      $toastMsg.textContent = msg;

      // If no undo available, hide button
      $toastUndo.style.display = action ? "inline-flex" : "none";

      $toast.classList.add("show");

      if (action) {
        $toastUndo.onclick = () => {
          action();
          hideToast();
        };
      } else {
        $toastUndo.onclick = null;
      }

      toastTimer = setTimeout(() => hideToast(), 5000);
    };

    const hideToast = () => {
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = null;
      $toast.classList.remove("show");
    };

    const formatTime = (ms) => {
      const d = new Date(ms);
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const titleOf = (text) => {
      const line = (text ?? "").split("\n")[0].trim();
      return line.length ? line.slice(0, 30) : "（無題）";
    };

    const escapeHtml = (s) =>
      s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");

    const normalizeImported = (maybe) => {
      // 想定：[{id,text,updatedAt,pinned?}, ...]
      if (!Array.isArray(maybe)) return [];
      return maybe
        .filter(m => m && typeof m.id === "string" && typeof m.text === "string" && typeof m.updatedAt === "number")
        .map(m => ({ id: m.id, text: m.text, updatedAt: m.updatedAt, pinned: !!m.pinned }));
    };

    const safeSave = () => {
      try {
        localStorage.setItem(KEY, JSON.stringify(memos));
        setStatus("保存しました", "ok", 900);
        return true;
      } catch (e) {
        setStatus("保存に失敗（容量不足？）", "err", 1800);
        return false;
      }
    };

    const load = () => {
      try {
        const raw = localStorage.getItem(KEY);
        memos = raw ? normalizeImported(JSON.parse(raw)) : [];
      } catch {
        memos = [];
      }
      if (memos.length === 0) {
        const id = uid();
        memos = [{ id, text: "", updatedAt: now(), pinned: false }];
        currentId = id;
        safeSave();
      } else {
        // ensure pinned exists
        memos = memos.map(m => ({ ...m, pinned: !!m.pinned }));
        currentId = sortedAll()[0]?.id ?? memos[0].id;
      }
    };

    const sortedAll = () => {
      // pinned first, then updated desc
      return [...memos].sort((a,b) => {
        const pa = a.pinned ? 1 : 0;
        const pb = b.pinned ? 1 : 0;
        if (pb !== pa) return pb - pa;
        return b.updatedAt - a.updatedAt;
      });
    };

    const select = (id) => {
      currentId = id;
      const m = memos.find(x => x.id === id);
      $editor.value = m ? m.text : "";
      render();
      $editor.focus();
      const el = document.querySelector(`.item[data-id="${CSS.escape(id)}"]`);
      if (el) el.scrollIntoView({ block: "nearest" });
    };

    const filtered = () => {
      const q = ($search.value ?? "").trim().toLowerCase();
      const sorted = sortedAll();
      if (!q) return sorted;
      return sorted.filter(m => (m.text ?? "").toLowerCase().includes(q) || titleOf(m.text).toLowerCase().includes(q));
    };

    const updatePinButton = () => {
      const m = memos.find(x => x.id === currentId);
      const pinned = !!m?.pinned;
      $pin.classList.toggle("pinned", pinned);
      $pin.textContent = pinned ? "📌 ピン中" : "📌 ピン";
      $pin.title = pinned ? "ピン留め解除" : "ピン留め（固定）";
    };

    const render = () => {
      const items = filtered();
      $count.textContent = `表示: ${items.length} / 全: ${memos.length}`;

      updatePinButton();

      $list.innerHTML = "";
      for (const m of items) {
        const div = document.createElement("div");
        div.className = "item" + (m.id === currentId ? " active" : "");
        div.dataset.id = m.id;

        const pin = m.pinned ? `<span class="pinBadge" title="ピン留め">📌</span>` : "";
        div.innerHTML = `
          <div class="titleRow">
            ${pin}
            <div class="title">${escapeHtml(titleOf(m.text))}</div>
          </div>
          <div class="meta">${formatTime(m.updatedAt)}</div>
        `;
        div.addEventListener("click", () => select(m.id));
        $list.appendChild(div);
      }
    };

    // ---- Download (UTF-8 + BOM) ----
    const download = (filename, text, mime, addBom = true) => {
      const bom = addBom ? "\uFEFF" : "";
      const blob = new Blob([bom + text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    };

    const isoTs = () => new Date().toISOString().replaceAll(":", "-");

    // ---- Undo core ----
    const setUndo = (action) => {
      lastAction = { ...action, at: now() };
    };

    const doUndo = () => {
      if (!lastAction) return false;

      if (lastAction.type === "delete") {
        const { memo, indexHint, prevCurrentId } = lastAction.payload;

        // restore
        if (!memos.some(x => x.id === memo.id)) {
          // insert near original index (best effort), otherwise push
          const idx = Math.min(Math.max(indexHint ?? memos.length, 0), memos.length);
          memos.splice(idx, 0, memo);
        }
        safeSave();

        // restore selection if possible
        const targetId = memo.id || prevCurrentId;
        currentId = memos.some(x => x.id === targetId) ? targetId : (sortedAll()[0]?.id ?? memos[0]?.id);
        const m = memos.find(x => x.id === currentId);
        $editor.value = m ? m.text : "";

        render();
        setStatus("元に戻しました", "ok", 900);
        lastAction = null;
        return true;
      }

      if (lastAction.type === "pin") {
        const { id, prevPinned } = lastAction.payload;
        const m = memos.find(x => x.id === id);
        if (m) {
          m.pinned = prevPinned;
          safeSave();
          render();
          setStatus("元に戻しました", "ok", 900);
        }
        lastAction = null;
        return true;
      }

      return false;
    };

    // ---- Actions ----
    $new.addEventListener("click", () => {
      const id = uid();
      memos.push({ id, text: "", updatedAt: now(), pinned: false });
      select(id);
      safeSave();
    });

    $pin.addEventListener("click", () => {
      const m = memos.find(x => x.id === currentId);
      if (!m) return;

      const prev = !!m.pinned;
      m.pinned = !m.pinned;

      setUndo({ type: "pin", payload: { id: m.id, prevPinned: prev } });
      safeSave();
      render();

      showToast(m.pinned ? "ピン留めしました" : "ピン留めを解除しました", () => doUndo());
    });

    $del.addEventListener("click", () => {
      const idx = memos.findIndex(x => x.id === currentId);
      if (idx === -1) return;

      // delete immediately, offer undo (UX優先)
      const deleted = memos[idx];
      const prevCurrentId = currentId;

      memos.splice(idx, 1);

      if (memos.length === 0) {
        const id = uid();
        memos.push({ id, text: "", updatedAt: now(), pinned: false });
      }

      currentId = sortedAll()[0]?.id ?? memos[0].id;
      const m = memos.find(x => x.id === currentId);
      $editor.value = m ? m.text : "";

      setUndo({ type: "delete", payload: { memo: deleted, indexHint: idx, prevCurrentId } });

      safeSave();
      render();

      showToast("メモを削除しました", () => doUndo());
    });

    $editor.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const m = memos.find(x => x.id === currentId);
        if (!m) return;
        m.text = $editor.value;
        m.updatedAt = now();
        safeSave();
        render();
      }, 300);
    });

    $search.addEventListener("input", () => render());

    // ---- JSON export ----
    $exportJson.addEventListener("click", () => {
      const payload = { version: 2, exportedAt: Date.now(), memos };
      download(
        `mini-memos-${isoTs()}.json`,
        JSON.stringify(payload, null, 2),
        "application/json;charset=utf-8",
        true
      );
      setStatus("JSONを書き出しました", "ok", 1200);
    });

    // ---- Markdown export ----
    const toMarkdown = (memosArr) => {
      const sorted = [...memosArr].sort((a,b) => {
        const pa = a.pinned ? 1 : 0;
        const pb = b.pinned ? 1 : 0;
        if (pb !== pa) return pb - pa;
        return b.updatedAt - a.updatedAt;
      });
      const exportedAt = formatTime(Date.now());

      let out = `# ミニメモ 書き出し\n`;
      out += `ExportedAt: ${exportedAt}\n\n`;
      out += `---\n\n`;

      for (const m of sorted) {
        const title = titleOf(m.text);
        const updated = formatTime(m.updatedAt);
        const body = (m.text ?? "").trim();
        out += `## ${title}\n`;
        out += `Pinned: ${m.pinned ? "true" : "false"}\n`;
        out += `UpdatedAt: ${updated}\n\n`;
        out += `${body}\n\n`;
        out += `---\n\n`;
      }
      return out;
    };

    $exportMd.addEventListener("click", () => {
      const md = toMarkdown(memos);
      download(
        `mini-memos-${isoTs()}.md`,
        md,
        "text/markdown;charset=utf-8",
        true
      );
      setStatus("MDを書き出しました", "ok", 1200);
    });

    // ---- JSON import ----
    $import.addEventListener("click", () => $importFile.click());

    $importFile.addEventListener("change", async () => {
      const file = $importFile.files?.[0];
      if (!file) return;

      try {
        const text = await file.text();
        const obj = JSON.parse(text);

        const imported = normalizeImported(obj?.memos);
        if (imported.length === 0) throw new Error("有効なメモが0件です");

        const msg = `${imported.length}件のメモをインポートします。\n現在のメモ（${memos.length}件）は上書きされます。\n\nよろしいですか？`;
        if (!confirm(msg)) return;

        memos = imported.map(m => ({ ...m, pinned: !!m.pinned }));
        currentId = sortedAll()[0]?.id ?? memos[0].id;

        const m = memos.find(x => x.id === currentId);
        $editor.value = m ? m.text : "";

        safeSave();
        render();
        setStatus("インポートしました", "ok", 1400);

        // importing resets undo (safe)
        lastAction = null;
        hideToast();
      } catch (e) {
        alert("インポートに失敗しました: " + (e?.message ?? e));
        setStatus("インポート失敗", "err", 1600);
      } finally {
        $importFile.value = "";
      }
    });

    // ---- Keyboard: Undo (Ctrl/⌘ + Z) ----
    window.addEventListener("keydown", (e) => {
      const z = (e.key || "").toLowerCase() === "z";
      const mod = e.ctrlKey || e.metaKey;
      if (mod && z) {
        // avoid interfering with native undo inside textarea when possible:
        // if focus is in textarea, let browser handle text undo first.
        const active = document.activeElement;
        if (active === $editor) return;
        if (lastAction) {
          e.preventDefault();
          doUndo();
          hideToast();
        }
      }
    });

    // boot
    load();
    select(currentId);
    render();
  </script>
</body>
</html>
